<section class="works animate-on-scroll" id="works">
    <div class="container">
        <h2 class="section-title">Мои работы</h2>
        <p class="works-intro">Мои учебные и личные проекты.</p>
        <div class="works-grid">
            {% for work in works %}
            <div class="work-item">
                <div class="work-icon"><i class="fas {{ work[3] }}"></i></div>
                <h3>{{ work[1] }}</h3>
                <p>{{ work[2] }}</p>
                {% if work[4] %}
                <a href="/{{ work[4] }}" class="btn" download>📥 Скачать</a>
                {% endif %}
            </div>
            {% endfor %}
            {% if not works %}
            <div class="work-item empty-work">
                <div class="work-icon"><i class="fas fa-laptop-code"></i></div>
                <h3>Пока нет работ</h3>
                <p>Я работаю над новыми проектами!</p>
            </div>
            {% endif %}
        </div>
    </div>
</section>
