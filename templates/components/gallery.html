<section class="gallery animate-on-scroll" id="gallery">
    <canvas id="waveCanvas"></canvas>
    <div class="container" style="position:relative;z-index:2;">
        <h2 class="section-title" style="color:#fff;">Галерея фото</h2>
        <div class="gallery-grid" id="galleryGrid">
            {% for item in gallery %}
            <div class="gallery-item">
                <img src="{{ item[1] }}" alt="{{ item[2] }}" data-full="{{ item[1] }}">
                <p>{{ item[2] }}</p>
            </div>
            {% endfor %}
            {% if not gallery %}
            <div class="gallery-item empty-placeholder-card">
                <div class="empty-card-icon"><i class="fas fa-images"></i></div>
                <p>Фотографии появятся здесь</p>
            </div>
            {% endif %}
        </div>
    </div>
</section>
