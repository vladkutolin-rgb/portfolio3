<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:#f5f5f5}
        .header{background:#111;color:white;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .header h1{font-size:22px}.header h1 span{color:#00a336}
        .logout-btn{background:#ff4444;color:white;padding:8px 20px;border:none;border-radius:5px;cursor:pointer;text-decoration:none;font-weight:600}
        .container{max-width:1200px;margin:30px auto;padding:0 20px}
        .section{background:white;border-radius:10px;padding:25px;margin-bottom:30px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
        .section h2{margin-bottom:20px;color:#333;border-bottom:3px solid #00a336;padding-bottom:10px}
        .form-row{display:flex;gap:15px;margin-bottom:15px;flex-wrap:wrap}
        .form-group{flex:1;min-width:200px}
        .form-group label{display:block;margin-bottom:5px;font-weight:600;color:#555}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:5px;font-size:14px}
        .form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:#00a336}
        .btn{background:#00a336;color:white;padding:10px 25px;border:none;border-radius:5px;cursor:pointer;font-size:16px;font-weight:600;margin:3px}
        .btn:hover{background:#008a2d}
        .btn-sm{padding:5px 12px;font-size:13px}
        .btn-red{background:#ff4444}.btn-red:hover{background:#cc0000}
        .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:20px}
        .item-card{background:#f9f9f9;border-radius:8px;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,.1);position:relative}
        .item-card img{width:100%;height:180px;object-fit:cover}
        .item-info{padding:15px}.item-info h3{font-size:16px;margin-bottom:5px}.item-info p{font-size:13px;color:#777}
        .delete-btn{position:absolute;top:10px;right:10px;background:rgba(255,0,0,.8);color:white;border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}
        .delete-btn:hover{background:red}
        .success-msg{background:#4CAF50;color:white;padding:10px;border-radius:5px;margin-bottom:15px;display:none}
        .error-msg{background:#f44336;color:white;padding:10px;border-radius:5px;margin-bottom:15px;display:none}
        .edit-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px;background:#f0f0f0;border-radius:5px;margin-bottom:6px}
        .edit-row input{padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px}
        .edit-row input[type="number"]{width:65px}
        .edit-row input[type="text"]{flex:1;min-width:80px}
        .edit-row select{padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px}
        .category-title{font-weight:700;color:#00a336;margin:15px 0 10px;font-size:16px}
    </style>
</head>
<body>
<div class="header"><h1>Админ-<span>Панель</span></h1><a href="/logout" class="logout-btn">Выйти</a></div>
<div class="container">

<!-- Аватар -->
<div class="section"><h2>🖼️ Аватар</h2><div class="success-msg" id="avatarSuccess">✅ Обновлён!</div>
<form id="avatarForm" enctype="multipart/form-data"><div class="form-row"><div class="form-group"><label>Фото</label><input type="file" name="avatar" accept="image/*" required></div></div><button class="btn">Обновить</button></form></div>

<!-- Галерея -->
<div class="section"><h2>📸 Галерея</h2><div class="success-msg" id="gallerySuccess">✅</div>
<form id="galleryForm" enctype="multipart/form-data"><div class="form-row"><div class="form-group"><label>Фото</label><input type="file" name="photo" accept="image/*" required></div><div class="form-group" style="flex:2"><label>Описание</label><input type="text" name="description"></div></div><button class="btn">Добавить</button></form>
<div class="items-grid" id="galleryItems"></div></div>

<!-- Сертификаты -->
<div class="section"><h2>📜 Сертификаты</h2><div class="success-msg" id="certSuccess">✅</div>
<form id="certForm" enctype="multipart/form-data"><div class="form-row"><div class="form-group"><label>Фото</label><input type="file" name="photo" accept="image/*" required></div><div class="form-group"><label>Название</label><input type="text" name="title" required></div></div><div class="form-row"><div class="form-group"><label>Описание</label><input type="text" name="description"></div><div class="form-group"><label>Организация</label><input type="text" name="organization"></div></div><div class="form-row"><div class="form-group"><label>Год</label><input type="text" name="year"></div><div class="form-group"><label>Курс</label><select name="course"><option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option></select></div></div><button class="btn">Добавить</button></form>
<div class="items-grid" id="certItems"></div></div>

<!-- Работы -->
<div class="section"><h2>💼 Работы</h2><div class="success-msg" id="workSuccess">✅</div>
<form id="workForm" enctype="multipart/form-data"><div class="form-row"><div class="form-group"><label>Название</label><input type="text" name="title" required></div><div class="form-group"><label>Иконка</label><input type="text" name="icon" value="fa-code"></div></div><div class="form-row"><div class="form-group" style="flex:2"><label>Описание</label><input type="text" name="description"></div><div class="form-group"><label>Файл</label><input type="file" name="file"></div></div><button class="btn">Добавить</button></form>
<div class="items-grid" id="workItems"></div></div>

<!-- Навыки -->
<div class="section"><h2>📊 Навыки</h2><div class="success-msg" id="skillsSuccess">✅</div>
<div id="skillsEdit"></div>
<button class="btn" onclick="addSkill()">+ Добавить</button><button class="btn" onclick="saveSkills()">Сохранить</button></div>

<!-- Тех-стек -->
<div class="section"><h2>🔧 Тех-стек</h2><div class="success-msg" id="techSuccess">✅</div>
<div id="techstackEdit"></div>
<button class="btn" onclick="addTech()">+ Добавить</button><button class="btn" onclick="saveTechstack()">Сохранить</button></div>

<!-- Категории -->
<div class="section"><h2>📁 Категории</h2>
<form id="catForm"><div class="form-row"><div class="form-group"><input type="text" id="catName" placeholder="Новая категория"></div></div><button class="btn">Добавить</button></form>
<div id="catList"></div></div>

</div>
<script>
fetch('/api/check-auth').then(r=>r.json()).then(d=>{if(!d.authenticated)location.href='/login'});
function showMsg(id){document.getElementById(id).style.display='block';setTimeout(()=>document.getElementById(id).style.display='none',2000)}
// Аватар
document.getElementById('avatarForm').addEventListener('submit',function(e){e.preventDefault();fetch('/api/avatar',{method:'POST',body:new FormData(this)}).then(r=>r.json()).then(d=>{if(d.success){showMsg('avatarSuccess');this.reset()}})});
// Галерея
function loadGallery(){fetch('/api/gallery').then(r=>r.json()).then(items=>{document.getElementById('galleryItems').innerHTML=items.map(i=>`<div class="item-card"><img src="${i.photo}"><button class="delete-btn" onclick="del('gallery',${i.id})">✕</button><div class="item-info"><p>${i.description||''}</p></div></div>`).join('')})}
document.getElementById('galleryForm').addEventListener('submit',function(e){e.preventDefault();fetch('/api/gallery',{method:'POST',body:new FormData(this)}).then(r=>r.json()).then(d=>{if(d.success){showMsg('gallerySuccess');this.reset();loadGallery()}})});
// Сертификаты
function loadCerts(){fetch('/api/certificates').then(r=>r.json()).then(items=>{document.getElementById('certItems').innerHTML=items.map(i=>`<div class="item-card"><img src="${i.photo}"><button class="delete-btn" onclick="del('certificates',${i.id})">✕</button><div class="item-info"><h3>${i.title}</h3><p>${i.organization||''} | ${i.year||''}</p><p>${i.course} курс</p></div></div>`).join('')})}
document.getElementById('certForm').addEventListener('submit',function(e){e.preventDefault();fetch('/api/certificates',{method:'POST',body:new FormData(this)}).then(r=>r.json()).then(d=>{if(d.success){showMsg('certSuccess');this.reset();loadCerts()}})});
// Работы
function loadWorks(){fetch('/api/works').then(r=>r.json()).then(items=>{document.getElementById('workItems').innerHTML=items.map(i=>`<div class="item-card"><div class="item-info"><h3><i class="fas ${i.icon}"></i> ${i.title}</h3><p>${i.description||''}</p>${i.file_path?`<a href="/${i.file_path}" class="btn btn-sm" download>📥</a>`:''}</div><button class="delete-btn" onclick="del('works',${i.id})">✕</button></div>`).join('')})}
document.getElementById('workForm').addEventListener('submit',function(e){e.preventDefault();fetch('/api/works',{method:'POST',body:new FormData(this)}).then(r=>r.json()).then(d=>{if(d.success){showMsg('workSuccess');this.reset();loadWorks()}})});
// Навыки
function loadSkills(){fetch('/api/skills').then(r=>r.json()).then(items=>{document.getElementById('skillsEdit').innerHTML=items.map(i=>`<div class="edit-row"><input type="text" value="${i.name}" data-id="${i.id}" class="sk-name"> <input type="number" value="${i.percent}" data-id="${i.id}" class="sk-pct" min="0" max="100">% <input type="number" value="${i.sort_order}" data-id="${i.id}" class="sk-ord" style="width:50px" title="Порядок"> <button class="btn btn-red btn-sm" onclick="del('skills',${i.id})">✕</button></div>`).join('')})}
function addSkill(){fetch('/api/skills',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'Новый',percent:50})}).then(()=>loadSkills())}
function saveSkills(){document.querySelectorAll('#skillsEdit .edit-row').forEach(r=>{const id=r.querySelector('.sk-name').dataset.id;fetch(`/api/skills/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:r.querySelector('.sk-name').value,percent:r.querySelector('.sk-pct').value,sort_order:r.querySelector('.sk-ord').value})})});showMsg('skillsSuccess')}
// Тех-стек
function loadTechstack(){fetch('/api/techstack').then(r=>r.json()).then(items=>{let html='',curCat='';items.forEach(i=>{if(i.category!==curCat){curCat=i.category;html+=`<div class="category-title">${curCat}</div>`}html+=`<div class="edit-row"><input type="text" value="${i.name}" data-id="${i.id}" class="t-name" style="flex:2"> <select data-id="${i.id}" class="t-icon"><option value="fab fa-python" ${i.icon==='fab fa-python'?'selected':''}>Python</option><option value="fas fa-code" ${i.icon==='fas fa-code'?'selected':''}>Код</option><option value="fas fa-database" ${i.icon==='fas fa-database'?'selected':''}>БД</option><option value="fas fa-file-word" ${i.icon==='fas fa-file-word'?'selected':''}>Word</option><option value="fas fa-file-excel" ${i.icon==='fas fa-file-excel'?'selected':''}>Excel</option><option value="fas fa-file-powerpoint" ${i.icon==='fas fa-file-powerpoint'?'selected':''}>PPT</option><option value="fas fa-paint-brush" ${i.icon==='fas fa-paint-brush'?'selected':''}>Кисть</option><option value="fas fa-vector-square" ${i.icon==='fas fa-vector-square'?'selected':''}>Вектор</option><option value="fas fa-edit" ${i.icon==='fas fa-edit'?'selected':''}>Правка</option><option value="fas fa-brain" ${i.icon==='fas fa-brain'?'selected':''}>AI</option><option value="fas fa-search" ${i.icon==='fas fa-search'?'selected':''}>Поиск</option><option value="fas fa-image" ${i.icon==='fas fa-image'?'selected':''}>Фото</option></select> <input type="number" value="${i.percent}" data-id="${i.id}" class="t-pct" min="0" max="100">% <input type="text" value="${i.subtitle||''}" data-id="${i.id}" class="t-sub" placeholder="Подпись"> <input type="text" value="${i.category}" data-id="${i.id}" class="t-cat" style="width:100px" placeholder="Категория"> <input type="number" value="${i.sort_order}" data-id="${i.id}" class="t-ord" style="width:50px" title="Порядок"> <button class="btn btn-red btn-sm" onclick="del('techstack',${i.id})">✕</button></div>`});document.getElementById('techstackEdit').innerHTML=html})}
function addTech(){fetch('/api/techstack',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({category:'Новая категория',name:'Новый',icon:'fa-code',percent:50})}).then(()=>loadTechstack())}
function saveTechstack(){document.querySelectorAll('#techstackEdit .edit-row').forEach(r=>{const id=r.querySelector('.t-name').dataset.id;fetch(`/api/techstack/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:r.querySelector('.t-name').value,icon:r.querySelector('.t-icon').value,percent:r.querySelector('.t-pct').value,subtitle:r.querySelector('.t-sub').value,category:r.querySelector('.t-cat').value,sort_order:r.querySelector('.t-ord').value})})});showMsg('techSuccess')}
// Категории
function loadCats(){fetch('/api/categories').then(r=>r.json()).then(items=>{document.getElementById('catList').innerHTML=items.map(i=>`<div class="edit-row"><input type="text" value="${i.name}" data-id="${i.id}" class="c-name"> <input type="number" value="${i.sort_order}" data-id="${i.id}" class="c-ord" style="width:60px"> <button class="btn btn-red btn-sm" onclick="del('categories',${i.id})">✕</button></div>`).join('')})}
document.getElementById('catForm').addEventListener('submit',function(e){e.preventDefault();fetch('/api/categories',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('catName').value})}).then(()=>{document.getElementById('catName').value='';loadCats()})})
function saveAllCats(){document.querySelectorAll('#catList .edit-row').forEach(r=>{const id=r.querySelector('.c-name').dataset.id;fetch(`/api/categories/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:r.querySelector('.c-name').value,sort_order:r.querySelector('.c-ord').value})})})}
setInterval(saveAllCats,3000);

function del(type,id){if(confirm('Удалить?'))fetch(`/api/${type}/${id}`,{method:'DELETE'}).then(()=>{loadGallery();loadCerts();loadWorks();loadSkills();loadTechstack();loadCats()})}
loadGallery();loadCerts();loadWorks();loadSkills();loadTechstack();loadCats();
</script>
</body>
</html>
